{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <h1>Candidates</h1>
  <p>Manage all candidate profiles</p>
</div>
<div style="margin-bottom:16px;">
  <a href="/candidates/add" class="btn btn-primary">+ Add Candidate</a>
</div>
<div class="card">
  <table>
    <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Owner ID</th><th>Actions</th></tr></thead>
    <tbody>
      {% for c in candidates %}
      <tr>
        <td style="font-family:'IBM Plex Mono',monospace;color:var(--text-dim);">{{ c.id }}</td>
        <td><a href="/candidate/{{ c.id }}">{{ c.name }}</a></td>
        <td>{{ c.email }}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);">{{ c.owner_id }}</td>
        <td>
          <form method="POST" action="/candidates/delete/{{ c.id }}" style="display:inline;">
          
            <button class="btn btn-danger" style="padding:4px 10px;font-size:11px;" onclick="return confirm('Delete?')">Delete</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
