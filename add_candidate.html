{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <h1>Add Candidate</h1>
  <p>Add a new candidate to the system</p>
</div>
<div class="card" style="max-width:560px;">
  
  <form method="POST" action="/candidates/add">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="Jane Doe" required/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="jane@example.com"/>
    </div>
    <div class="form-group">
      <label>Resume / Notes</label>
      <textarea name="resume" placeholder="Paste resume summary, skills, or notes…"></textarea>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary" type="submit">Save Candidate</button>
      <a href="/candidates" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
