<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>HireFlow — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0d0f14;--surface:#151820;--border:#252a35;--accent:#e8c547;--accent2:#e05c5c;--text:#c8cdd8;--text-dim:#5a6070; }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .login-wrap{width:100%;max-width:400px;padding:24px;}
    .brand{text-align:center;margin-bottom:32px;}
    .brand-name{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:600;color:var(--accent);}
    .brand-sub{font-size:12px;color:var(--text-dim);margin-top:6px;letter-spacing:.06em;}
    .badge{display:inline-block;background:var(--accent2);color:#fff;font-size:9px;padding:2px 8px;border-radius:3px;margin-top:8px;letter-spacing:.08em;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:28px;}
    .form-group{margin-bottom:16px;}
    .form-group label{display:block;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
    .form-group input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:9px 12px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border .15s;}
    .form-group input:focus{border-color:var(--accent);}
    .btn{width:100%;padding:10px;background:var(--accent);color:#0d0f14;border:none;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;}
    .btn:hover{opacity:.9;}
    .alert{padding:10px 14px;border-radius:4px;font-size:13px;margin-bottom:16px;background:rgba(224,92,92,.12);border:1px solid rgba(224,92,92,.3);color:#f08080;}
    .hint{margin-top:20px;background:rgba(232,197,71,.07);border:1px solid rgba(232,197,71,.2);border-radius:4px;padding:14px;}
    .hint-title{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);font-family:'IBM Plex Mono',monospace;margin-bottom:8px;}
    .hint-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);padding:3px 0;}
    .hint-row span{font-family:'IBM Plex Mono',monospace;color:var(--text);}
    .vuln-note{margin-top:12px;font-size:11px;color:var(--text-dim);text-align:center;}
    .vuln-tag{display:inline-block;font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 7px;border-radius:3px;background:rgba(224,92,92,.2);color:#f08080;border:1px solid rgba(224,92,92,.3);}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-name">⬡ HireFlow</div>
    <div class="brand-sub">HireFlow: An Online Interview Candidate Manager</div>
    <div class="badge">v.1.2</div>
  </div>
  <div class="card">
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <form method="POST" action="/login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••"/>
      </div>
      <button class="btn" type="submit">Sign In</button>
    </form>
    
    </div>
  </div>
</div>
</body>
</html>
